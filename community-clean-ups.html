<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Community Clean-Ups</title>
        <style>

            body{
                font-family: 'Courier New', Courier, monospace;
                margin: 0;
                background: #f5f5f5;
            }

            header{
                background: #004d29;
                color: white;
                text-align: center;
                padding: 30px;
            }

            .gallery{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
                gap: 20px;
                padding: 40px;
            }

            .gallery img{
                width: 100%;
                height: 300px;
                object-fit: cover;
                border-radius: 10px;
            }

            .gallery img:hover{
                transform: scale(1.03);
                transition: 0.3s;
            }

            .back{
                display: inline-block;
                margin: 20px;
                background: #3b9d2f;
                color: white;
                text-decoration: none;
                padding: 12px 25px;
                border-radius: 8px;
            }
            
             .lightbox{
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            .lightbox img{
                max-width: 95%;
                max-height: 95%;
                border-radius: 10px;
            }

        </style>
    </head>

    <body>

        <header>
            <h1>Community Clean-Up Projects</h1>
            <p>Some of the sanitation works carried out by QuickPick Waste Management Services</p>
        </header>

        <a href="index.html" class="back">Back to Home</a>

        <div class="gallery">
             <img src="images/awareness.jpg.JPG" onclick="openImage(this.src)">
            <img src="images/kma.jpg.JPG" onclick="openImage(this.src)">
            <img src="images/dump.jpg.JPG" onclick="openImage(this.src)">
            <img src="images/launch-poster.jpg" onclick="openImage(this.src)">
        </div>
        
          <div id="lightbox" class="lightbox" onclick="closeImage()">
            <img id="lightbox-img">
        </div>

         <script>
            function openImage(src){
                document.getElementById("lightbox").style.display = "flex";
                document.getElementById("lightbox-img").src = src;
            }

            function closeImage(){
                document.getElementById("lightbox").style.display = "none";
            }
        </script>

    </body>
</html>
