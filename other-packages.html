<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Other Packages - QuickPick Services</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#004d29;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:2.5rem;
}

.package-container{
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

.package-image{
    width:100%;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    transition:0.3s;
}

.package-image:hover{
    transform:scale(1.01);
}

/* FULL SCREEN IMAGE */

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
    cursor:pointer;
}

.lightbox img{
    max-width:95%;
    max-height:95%;
    border-radius:10px;
}

/* MOBILE */

@media(max-width:768px){

    header h1{
        font-size:1.8rem;
    }

}

</style>
</head>

<body>

<header>
    <h1>OUR OTHER PACKAGES</h1>
</header>

<div class="package-container">

    <img
    src="images/other-packages.jpg"
    alt="QuickPick Other Packages"
    class="package-image"
    onclick="openImage(this.src)">

</div>

<!-- FULL SCREEN VIEW -->

<div id="lightbox"
     class="lightbox"
     onclick="closeImage()">

    <img id="lightbox-img">

</div>

<script>

function openImage(src){

    document.getElementById("lightbox").style.display="flex";

    document.getElementById("lightbox-img").src=src;

}

function closeImage(){

    document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
