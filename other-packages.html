<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Other PACKAGES</title>

        <style>

             body{
                font-family: 'Courier New', Courier, monospace;
                margin: 0;
                background: #f5f5f5;
            }

            header{
                background: #004d29;
                color: white;
                text-align: center;
                padding: 30px;
            }

            .gallery{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
                gap: 20px;
                padding: 40px;
            }

            .gallery img{
                width: 100%;
                height: 300px;
                object-fit: cover;
                border-radius: 10px;
            }

            .gallery img:hover{
                transform: scale(1.03);
                transition: 0.3s;
            }

            .back{
                display: inline-block;
                margin: 20px;
                background: #3b9d2f;
                color: white;
                text-decoration: none;
                padding: 12px 25px;
                border-radius: 8px;
            }
            
             .lightbox{
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            .lightbox img{
                max-width: 95%;
                max-height: 95%;
                border-radius: 10px;
            }

        </style>
    </head>

    <body>
        <header>
            <h1>OUR OTHER PACKAGES</h1>
            <p>We've got you covered witH ALL PACKAGES</p>
        </header>

         <a href="index.html" class="back">Back to Home</a>
        
        <div class="dust">
            <img src="images/dustinbins.png">
        </div>
    </body>
